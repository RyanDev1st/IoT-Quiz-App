<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IoT for Beginners - Mock Exam</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;500;600&family=JetBrains+Mono:wght@400;500&family=Playfair+Display:wght@500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
  <!-- Session Sidebar -->
  <aside class="session-sidebar" id="session-sidebar">
    <div class="session-sidebar-header">
      <h2>Sessions</h2>
      <div style="display: flex; gap: 0.5rem;">
        <button id="btn-new-session" class="nav-btn" title="New Session"><i class="fa-solid fa-plus"></i></button>
        <button id="btn-toggle-sidebar" class="nav-btn" title="Collapse"><i class="fa-solid fa-chevron-left"></i></button>
      </div>
    </div>
    <ul id="session-list" class="session-list">
      <!-- Injected via JS -->
    </ul>
  </aside>

  <button id="btn-open-sidebar" class="nav-btn hidden" style="position: fixed; left: 1rem; top: 1.5rem; z-index: 50;" title="Open Sessions"><i class="fa-solid fa-bars"></i></button>
  <div id="app">
    <header class="app-header">
      <h1>IoT Mock Exam</h1>
      <p id="progress-text">Loading...</p>
      <div class="progress-bar">
        <div class="progress-fill" id="progress-fill"></div>
      </div>
    </header>

    <!-- Unclear Nudge Button -->
    <div id="unclear-nudge" class="unclear-nudge hidden">
      <span>Unclear?</span> <i class="fa-solid fa-book-open"></i>
    </div>

    <!-- Theory Sidebar -->
    <div id="theory-sidebar" class="theory-sidebar">
      <div class="theory-header">
        <h2>Theory & Definitions</h2>
        <button id="close-theory" class="close-btn"><i class="fa-solid fa-xmark"></i></button>
      </div>
      <div id="theory-content" class="theory-content">
        <p>Select an option first to see related theory.</p>
      </div>
    </div>

    <main class="main-content">
      <div id="quiz-screen" class="screen active">
        <div id="single-question-container" class="question-container">
          <!-- Injected via JS -->
        </div>
        
        <div class="navigation-controls">
          <button id="btn-prev" class="nav-btn"><i class="fa-solid fa-arrow-left"></i> Previous</button>
          <button id="btn-next" class="nav-btn">Next <i class="fa-solid fa-arrow-right"></i></button>
        </div>
        
        <div id="submit-container" class="submit-container mt-4 hidden">
          <button id="btn-submit" class="btn btn-primary">Submit Exam & See Score</button>
        </div>
      </div>

      <div id="score-screen" class="screen hidden">
        <div class="score-sticky" id="score-banner">
          <h2>Final Score: <span id="final-score">0</span>%</h2>
          <p id="score-feedback"></p>
          <button id="btn-retry" class="btn btn-primary mt-4">Retake Exam</button>
        </div>
      </div>
    </main>
  </div>

  <script src="data.js"></script>
  <script src="theory.js"></script>
  <script src="supermemo.js"></script>
  <script src="app.js"></script>
</body>
</html>
